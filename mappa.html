<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Cliente</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #map {
            width: 100%;
            height: 400px;
            border-radius: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>Mappa Cliente</h1>

<div class="card" id="infoCliente">
    Caricamento...
</div>

<div id="map"></div>

<button onclick="naviga()">Naviga con Google Maps</button>
<button onclick="torna()">Torna alla scheda</button>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxL4HD7DaYk0h9yAy2nYIRDscTOFt9lF5QnwaFBGl79huKFPThuys45VNN8IdVRz6e5fw/exec";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    let clienti = [];
    let cliente = null;
    let coords = null;

    async function carica() {
        const res = await fetch(API_URL);
        const text = await res.text();
        clienti = text ? JSON.parse(text) : [];
        cliente = clienti[id];

        document.getElementById("infoCliente").innerHTML = `
            <h3>${cliente.nome}</h3>
            <p>${cliente.indirizzo}</p>
            <p><strong>Ruolo:</strong> ${cliente.ruolo || "-"}</p>
        `;

        geocodifica(cliente.indirizzo);
    }

    async function geocodifica(indirizzo) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(indirizzo)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.length === 0) {
            alert("Indirizzo non trovato");
            return;
        }

        coords = [data[0].lat, data[0].lon];
        mostraMappa();
    }

    function mostraMappa() {
        const map = L.map('map').setView(coords, 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        L.marker(coords).addTo(map)
            .bindPopup(cliente.nome)
            .openPopup();
    }

    function naviga() {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(cliente.indirizzo)}`);
    }

    function torna() {
        window.location.href = `cliente.html?id=${id}`;
    }

    carica();
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
