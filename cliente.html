<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheda Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Scheda Cliente</h1>

<div class="card" id="contenuto">
    Caricamento...
</div>

<button onclick="salva()">Salva</button>
<button onclick="vaiMappa()">Apri Mappa</button>
<button onclick="creaEventoOutlook()">Aggiungi evento Outlook</button>
<button onclick="torna()">Torna al database</button>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxL4HD7DaYk0h9yAy2nYIRDscTOFt9lF5QnwaFBGl79huKFPThuys45VNN8IdVRz6e5fw/exec";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    let clienti = [];
    let cliente = null;

    async function caricaClienti() {
        const res = await fetch(API_URL);
        const text = await res.text();
        clienti = text ? JSON.parse(text) : [];
        cliente = clienti[id];
        mostraScheda();
    }

    async function salvaClienti() {
        await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(clienti)
        });
    }

    function mostraScheda() {
        document.getElementById("contenuto").innerHTML = `
            <label>Ragione Sociale</label>
            <input id="nome" value="${cliente.nome}">

            <label>Indirizzo</label>
            <input id="indirizzo" value="${cliente.indirizzo}">

            <label>Email</label>
            <input id="email" value="${cliente.email || ""}">

            <label>Telefono</label>
            <input id="telefono" value="${cliente.telefono || ""}">

            <label>Partita IVA</label>
            <input id="piva" value="${cliente.piva || ""}">

            <label>Ruolo</label>
            <select id="ruolo">
                <option value="">-- Seleziona --</option>
                <option value="Progettista">Progettista</option>
                <option value="Installatore">Installatore</option>
                <option value="Edile">Edile</option>
                <option value="Canalista">Canalista</option>
                <option value="General Contractor">General Contractor</option>
                <option value="Rivenditore">Rivenditore</option>
            </select>

            <label>Data ultima visita</label>
            <input type="date" id="ultimaVisita" value="${cliente.ultimaVisita || ""}">

            <h3>Persone di riferimento</h3>
            <div id="persone"></div>

            <button onclick="aggiungiPersona()">+ Aggiungi Persona</button>
        `;

        document.getElementById("ruolo").value = cliente.ruolo || "";
        aggiornaPersone();
    }

    function aggiornaPersone() {
        const div = document.getElementById("persone");
        div.innerHTML = "";

        cliente.persone.forEach((p, i) => {
            div.innerHTML += `
                <div class="card" style="padding:15px; margin-bottom:15px;">
                    <label>Nome</label>
                    <input value="${p.nome}" onchange="modificaPersona(${i}, 'nome', this.value)">
                    <label>Telefono</label>
                    <input value="${p.telefono}" onchange="modificaPersona(${i}, 'telefono', this.value)">
                    <label>Email</label>
                    <input value="${p.email}" onchange="modificaPersona(${i}, 'email', this.value)">
                    <button onclick="rimuoviPersona(${i})">Rimuovi</button>
                </div>
            `;
        });
    }

    function aggiungiPersona() {
        cliente.persone.push({ nome: "", telefono: "", email: "" });
        aggiornaPersone();
    }

    function modificaPersona(i, campo, valore) {
        cliente.persone[i][campo] = valore;
    }

    function rimuoviPersona(i) {
        cliente.persone.splice(i, 1);
        aggiornaPersone();
    }

    async function salva() {
        cliente.nome = document.getElementById("nome").value;
        cliente.indirizzo = document.getElementById("indirizzo").value;
        cliente.email = document.getElementById("email").value;
        cliente.telefono = document.getElementById("telefono").value;
        cliente.piva = document.getElementById("piva").value;
        cliente.ruolo = document.getElementById("ruolo").value;
        cliente.ultimaVisita = document.getElementById("ultimaVisita").value;

        clienti[id] = cliente;
        await salvaClienti();
        alert("Dati salvati");
    }

    function creaEventoOutlook() {
        const nome = cliente.nome;
        const data = document.getElementById("ultimaVisita").value;

        if (!data) {
            alert("Inserisci prima la data dell'ultima visita");
            return;
        }

        const url = `https://outlook.office.com/calendar/0/deeplink/compose?subject=Visita%20a%20${encodeURIComponent(nome)}&startdt=${data}&enddt=${data}&body=Visita%20presso%20${encodeURIComponent(nome)}&location=${encodeURIComponent(cliente.indirizzo)}`;
        window.open(url, "_blank");
    }

    function vaiMappa() {
        window.location.href = `mappa.html?id=${id}`;
    }

    function torna() {
        window.location.href = "index.html";
    }

    caricaClienti();
</script>

</body>
</html>
